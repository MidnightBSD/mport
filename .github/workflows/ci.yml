name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  midnightbsd:
    name: build (MidnightBSD 4.0.4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build on MidnightBSD
        uses: cross-platform-actions/action@v1.1.0
        with:
          operating_system: midnightbsd
          version: '4.0.4'
          shell: sh
          run: |
            make
